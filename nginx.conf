server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Debeka Global Shares fund data API
    # This avoids CORS issues by making the browser call our own domain
    location /fonds-service/ {
        proxy_pass https://www.debeka.de/fonds-service/;
        proxy_set_header Host www.debeka.de;
        proxy_set_header Accept application/json;
        proxy_ssl_server_name on;

        # Cache for 1 hour — fund prices update once per trading day
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # SPA fallback — serve index.html for all client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
